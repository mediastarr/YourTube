<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600,initial-scale=1,user-scalable=no">
<title>Herald • YouTube for Ray-Ban</title>
<style>
*{box-sizing:border-box}html,body{height:100%;margin:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,Inter,Roboto,sans-serif}
#app{width:600px;height:600px;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden}
.tabs{display:flex;height:48px;border-bottom:1px solid #111}
.tab{flex:1;background:none;border:none;color:#777;font-size:15px;font-weight:600}
.tab.active{color:#fff}.tab.active::after{content:"";position:absolute;bottom:0;left:30%;right:30%;height:2px;background:#fff}
#list{flex:1;overflow-y:auto;background:#000}
.card{height:96px;display:flex;align-items:center;padding:0 8px;gap:12px;border-bottom:1px solid #0a0a0a}
.thumb{width:160px;height:90px;background:#111;object-fit:cover}
.info{flex:1;min-width:0}
.title{color:#fff;font-weight:700;font-size:16px;line-height:20px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.channel{color:#999;font-size:13px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.focusable{outline:none;position:relative}
.focusable.focused{box-shadow:inset 0 0 3px #FFD60A}
#player{position:absolute;inset:48px 0 0;background:#000;display:flex;flex-direction:column}
#player.hidden{display:none}
#yt{width:600px;height:340px;background:#000;flex-shrink:0}
#yt iframe{width:100%;height:100%;border:0}
#yt.fullscreen{height:552px}
.controls{display:flex;gap:8px;padding:12px;background:#000;border-top:1px solid #111}
.ctrl{flex:1;background:#1a1a1a;border:none;color:#fff;padding:12px;border-radius:8px;font-weight:700;font-size:14px}
.ctrl.focusable.focused{background:#333;box-shadow:0 0 0 3px #FFD60A}
#player.fullscreen .controls,#player.fullscreen .meta{display:none}
.meta{padding:12px 16px;flex:1}
.meta-title{font-weight:700;font-size:17px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
#keyboard{position:absolute;bottom:0;left:0;right:0;background:#0a0a;border-top:1px solid #222;padding:8px;display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
#keyboard.hidden{display:none}
.key{background:#1a1a1a;border:none;color:#fff;padding:10px 0;border-radius:6px;font-size:14px;font-weight:600}
.key.focusable.focused{background:#333;box-shadow:0 0 0 2px #FFD60A}
.key.wide{grid-column:span 2}
#searchBox{display:flex;padding:12px;gap:8px;background:#000;border-bottom:1px solid #111}
#q{flex:1;background:#111;border:1px solid #222;color:#fff;padding:12px;border-radius:20px;font-size:15px}
</style>
</head>
<body>
<div id="app">
  <div class="tabs">
    <button class="tab focusable active" data-t="home">Home</button>
    <button class="tab focusable" data-t="search">Search</button>
    <button class="tab focusable" data-t="shorts">Shorts</button>
    <button class="tab focusable" data-t="live">Live</button>
  </div>
  <div id="list"></div>
  <div id="player" class="hidden">
    <div id="yt"></div>
    <div class="meta"><div class="meta-title" id="ptitle"></div></div>
    <div class="controls">
      <button class="ctrl focusable" id="back">← Back</button>
      <button class="ctrl focusable" id="rew">⏪10</button>
      <button class="ctrl focusable" id="play">⏯️</button>
      <button class="ctrl focusable" id="fwd">10⏩</button>
      <button class="ctrl focusable" id="fs">⛶</button>
    </div>
  </div>
  <div id="searchBox" style="display:none">
    <input id="q" class="focusable" placeholder="Search YouTube" readonly>
  </div>
  <div id="keyboard" class="hidden"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const KEY='AIzaSyDPiJX_1AP0-350XEa32O1NIxrfhBWwGBk';
let player,currentId,currentTab='home',focusIdx=0,focusables=[],isFullscreen=false;
const DEMO=[{id:'dQw4w9WgXcQ',title:'Rick Astley - Never Gonna Give You Up',channel:'Rick Astley'},{id:'9bZkp7q19f0',title:'PSY - GANGNAM STYLE',channel:'officialpsy'},{id:'jNQXAC9IVRw',title:'Me at the zoo',channel:'jawed'}];

function $(s){return document.querySelector(s)} function $$(s){return Array.from(document.querySelectorAll(s))}
function setFocus(){
  $$('.focusable').forEach(e=>e.classList.remove('focused'));
  focusables=$$('.focusable').filter(e=>e.offsetParent);
  if(focusables[focusIdx]){focusables[focusIdx].classList.add('focused');focusables[focusIdx].focus();}
}
function move(d){focusIdx=(focusIdx+d+focusables.length)%focusables.length;setFocus();}

async function load(tab){
  currentTab=tab;
  $$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.t===tab));
  $('#list').innerHTML='<div style="padding:40px;text-align:center;color:#666">Loading...</div>';
  let url='';
  if(tab==='home') url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&order=date&maxResults=20&q=a&key=${KEY}`;
  if(tab==='shorts') url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&maxResults=20&q=shorts&key=${KEY}`;
  if(tab==='live') url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&eventType=live&maxResults=20&q=live&key=${KEY}`;
  let videos=DEMO;
  try{const r=await fetch(url);const j=await r.json();videos=j.items.map(i=>({id:i.id.videoId,title:i.snippet.title,channel:i.snippet.channelTitle}))}catch(e){}
  $('#list').innerHTML='';
  videos.forEach(v=>{
    const c=document.createElement('div');c.className='card focusable';c.tabIndex=0;
    c.innerHTML=`<img class="thumb" src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg"><div class="info"><div class="title">${v.title}</div><div class="channel">${v.channel}</div></div>`;
    c.onclick=()=>openPlayer(v);
    $('#list').appendChild(c);
  });
  setFocus();
}
function openPlayer(v){
  currentId=v.id;
  $('#player').classList.remove('hidden');
  $('#list').style.display='none';
  $('.tabs').style.display='none';
  $('#ptitle').textContent=v.title;
  if(player) player.destroy();
  player=new YT.Player('yt',{videoId:v.id,playerVars:{autoplay:1,playsinline:1,controls:0,modestbranding:1},events:{onReady:()=>setFocus()}});
  focusIdx=2;setFocus();
}
function closePlayer(){
  if(player) player.stopVideo();
  $('#player').classList.add('hidden');
  $('#list').style.display='block';
  $('.tabs').style.display='flex';
  isFullscreen=false;$('#yt').classList.remove('fullscreen');
  setFocus();
}

// Controls
$('#back').onclick=closePlayer;
$('#play').onclick=()=>{const s=player.getPlayerState();s===1?player.pauseVideo():player.playVideo()};
$('#rew').onclick=()=>player.seekTo(player.getCurrentTime()-10,true);
$('#fwd').onclick=()=>player.seekTo(player.getCurrentTime()+10,true);
$('#fs').onclick=()=>{isFullscreen=!isFullscreen;$('#yt').classList.toggle('fullscreen',isFullscreen);document.querySelector('.controls').style.display=isFullscreen?'none':'flex';document.querySelector('.meta').style.display=isFullscreen?'none':'block'};

// Keyboard
const keys='ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890'.split('');
function buildKeys(){
  const kb=$('#keyboard');kb.innerHTML='';
  keys.forEach(k=>{const b=document.createElement('button');b.className='key focusable';b.textContent=k;b.onclick=()=>{$('#q').value+=k};kb.appendChild(b)});
  ['SPACE','DEL','ENTER'].forEach(k=>{const b=document.createElement('button');b.className='key focusable wide';b.textContent=k;b.onclick=()=>{if(k==='SPACE')$('#q').value+=' ';if(k==='DEL')$('#q').value=$('#q').value.slice(0,-1);if(k==='ENTER'){kb.classList.add('hidden');loadSearch($('#q').value)}};kb.appendChild(b)});
}
function showKeyboard(){buildKeys();$('#keyboard').classList.remove('hidden');$('#searchBox').style.display='flex';focusIdx=0;setFocus();}
async function loadSearch(q){
  $('#list').innerHTML='Loading...';
  try{const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20&q=${encodeURIComponent(q)}&key=${KEY}`);const j=await r.json();const vids=j.items.map(i=>({id:i.id.videoId,title:i.snippet.title,channel:i.snippet.channelTitle}));$('#list').innerHTML='';vids.forEach(v=>{const c=document.createElement('div');c.className='card focusable';c.innerHTML=`<img class="thumb" src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg"><div class="info"><div class="title">${v.title}</div><div class="channel">${v.channel}</div></div>`;c.onclick=()=>openPlayer(v);$('#list').appendChild(c)});setFocus();}catch(e){}
}

// Tabs
$$('.tab').forEach(t=>t.onclick=()=>{if(t.dataset.t==='search'){showKeyboard()}else{load(t.dataset.t);$('#searchBox').style.display='none';$('#keyboard').classList.add('hidden')}});

// D-pad
document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){e.preventDefault();move(e.key==='ArrowDown'||e.key==='ArrowRight'?1:-1)}
  if(e.key==='Enter'){e.preventDefault();document.activeElement?.click()}
  if(e.key==='Backspace'&&!$('#player').classList.contains('hidden')) closePlayer();
});

load('home');setTimeout(setFocus,300);
</script>
</body>
</html>
