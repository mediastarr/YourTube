<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="ray-ban-display" content="true">
<title>YouTube</title>
<link rel="manifest" href="/manifest.json">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:#0f0f0f;color:#fff;font-family:Roboto,system-ui;overflow:hidden}
  #top{position:fixed;top:12%;left:50%;transform:translateX(-50%);width:88%;max-width:820px;display:flex;gap:8px;z-index:30}
  #search{flex:1;background:#121212;border:1px solid #333;border-radius:24px;padding:12px 16px;color:#fff;font-size:15px;outline:none}
  #feed{position:fixed;top:22%;left:50%;transform:translateX(-50%);width:88%;max-width:820px;height:58vh;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-bottom:20px}
  .v{background:#181818;border-radius:12px;overflow:hidden}
  .t{aspect-ratio:16/9;background:#000}.t img{width:100%;height:100%;object-fit:cover;display:block}
  .m{padding:8px;font-size:13px}
  /* SHORTS - clean, no controls */
  #shorts{position:fixed;inset:0;background:#000;display:none;z-index:50;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}
  #shorts.on{display:block}
  .s-item{width:100%;height:100vh;scroll-snap-align:start;position:relative;background:#000}
  .s-item iframe{width:100%;height:100%;border:0;pointer-events:none} /* blocks YouTube UI */
  .s-overlay{position:absolute;inset:0;z-index:2} /* captures tap */
  #tabs{position:fixed;bottom:8%;left:50%;transform:translateX(-50%);display:flex;gap:12px;background:#111;padding:8px 16px;border-radius:28px;z-index:30;border:1px solid #272727}
  .tb{padding:6px 14px;color:#aaa;font-size:13px;border-radius:18px}.tb.on{color:#fff;background:#333}
  .back{position:fixed;top:20px;left:20px;width:40px;height:40px;background:rgba(0,0,0,.7);border-radius:50%;display:none;align-items:center;justify-content:center;z-index:60;font-size:22px}
  .back.on{display:flex}
</style>
</head>
<body>
<div id="top"><input id="search" type="search" inputmode="search" placeholder="Search YouTube" enterkeyhint="search"></div>
<div id="feed"></div>
<div id="shorts"></div>
<div class="back" id="back">×</div>
<div id="tabs"><div class="tb on" data-t="h">Home</div><div class="tb" data-t="s">Shorts</div></div>

<script>
const HOME_VIDS=[
  {id:'dQw4w9WgXcQ',t:'Never Gonna Give You Up'},
  {id:'9bZkp7q19f0',t:'GANGNAM STYLE'},
  {id:'kJQP7kiw5Fk',t:'Despacito'}
];
// STARTS ON YOUR VIDEO
const SHORTS=['KRJeVXQEoow','ckzUY_Dxp_g','8WylF542tR4','i5q7w0A4gHY','x5-KB5Kx8F4','d0T2gK5WPMU'];

const feed=document.getElementById('feed'),shorts=document.getElementById('shorts'),back=document.getElementById('back');

// Ray-Ban
if(window.RayBanDisplay){
  const rb=new RayBanDisplay({cursor:true,gesture:true});
  rb.on('tap',e=>{const el=document.elementFromPoint(e.x,e.y);if(el?.id==='search')el.focus();else el?.click()});
  rb.on('swipe',d=>{
    if(shorts.classList.contains('on')){
      shorts.scrollBy({top:d==='up'?-innerHeight:innerHeight,behavior:'smooth'});
    }else{
      feed.scrollBy({top:d==='up'?-250:250,behavior:'smooth'});
    }
  });
}

function showHome(){
  document.getElementById('top').style.display='flex';
  document.getElementById('tabs').style.display='flex';
  shorts.classList.remove('on');back.classList.remove('on');
  feed.innerHTML=HOME_VIDS.map(v=>`
    <div class="v" onclick="window.open('https://m.youtube.com/watch?v=${v.id}','_blank')">
      <div class="t"><img src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg"></div>
      <div class="m">${v.t}</div>
    </div>`).join('');
}

function showShorts(){
  document.getElementById('top').style.display='none';
  document.getElementById('tabs').style.display='none';
  shorts.classList.add('on');back.classList.add('on');
  
  // build clean Shorts feed - NO controls
  shorts.innerHTML = SHORTS.map(id=>`
    <div class="s-item" data-id="${id}">
      <iframe src="https://www.youtube.com/embed/${id}?controls=0&modestbranding=1&rel=0&playsinline=1&enablejsapi=1&autoplay=0&mute=1&loop=1&playlist=${id}&iv_load_policy=3&fs=0&disablekb=1" allow="autoplay"></iframe>
      <div class="s-overlay"></div>
    </div>`).join('');

  // auto-play current, pause others + tap to unmute
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      const f=en.target.querySelector('iframe');
      if(!f)return;
      if(en.isIntersecting){
        f.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}','*');
      }else{
        f.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}','*');
      }
    });
  },{threshold:0.8});
  
  shorts.querySelectorAll('.s-item').forEach(el=>{
    obs.observe(el);
    el.querySelector('.s-overlay').onclick=()=>{
      const f=el.querySelector('iframe');
      // toggle mute on tap
      f.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}','*');
    };
  });
}

document.getElementById('search').onkeydown=e=>{if(e.key==='Enter')location.href=`https://m.youtube.com/results?search_query=${encodeURIComponent(e.target.value)}`};
document.querySelectorAll('.tb').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));b.classList.add('on');b.dataset.t==='h'?showHome():showShorts()});
back.onclick=showHome;

showHome();
</script>
</body>
</html>
