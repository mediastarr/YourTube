<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>YouTube Mobile Clone</title>
<meta name="theme-color" content="#0f0f0f">
<style>
  :root{--bg:#0f0f0f;--card:#181818;--text:#fff;--sub:#aaa;--chip:#272727}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--text);font-family:Roboto,system-ui,Arial,sans-serif}
  header{position:sticky;top:0;z-index:50;background:var(--bg);padding:8px 12px 0}
 .top{display:flex;align-items:center;justify-content:space-between;height:48px}
 .logo{display:flex;align-items:center;gap:6px;font-weight:700;font-size:20px}
 .logo span{background:#ff0000;color:#fff;padding:2px 5px;border-radius:6px;font-size:14px}
 .actions{display:flex;gap:18px;align-items:center;font-size:20px}
 .avatar{width:28px;height:28px;border-radius:50%;background:#333}
  #searchBar{display:flex;margin:8px 0}
  #searchBar input{flex:1;background:#121212;border:1px solid #303030;border-radius:24px;padding:10px 14px;color:#fff;font-size:15px;outline:none}
 .chips{display:flex;gap:8px;overflow-x:auto;padding:8px 0 12px;scrollbar-width:none}
 .chips::-webkit-scrollbar{display:none}
 .chip{flex-shrink:0;background:var(--chip);padding:7px 12px;border-radius:8px;font-size:14px;border:1px solid #333}
 .chip.active{background:#fff;color:#000}
  main{padding-bottom:70px}
 .video{margin-bottom:16px}
 .thumb{position:relative;width:100%;aspect-ratio:16/9;background:#000;overflow:hidden}
 .thumb img{width:100%;height:100%;object-fit:cover}
 .duration{position:absolute;right:6px;bottom:6px;background:rgba(0,0,0,.8);padding:2px 4px;border-radius:4px;font-size:12px}
 .meta{display:flex;gap:12px;padding:10px 12px}
 .av{width:36px;height:36px;border-radius:50%;background:#333;flex-shrink:0;margin-top:2px}
 .info{flex:1;min-width:0}
 .title{font-size:15px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
 .sub{font-size:13px;color:var(--sub)}
 .shorts-shelf{padding:0 12px 16px}
 .shorts-head{display:flex;justify-content:space-between;align-items:center;margin:8px 0}
 .shorts-row{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none}
 .shorts-row::-webkit-scrollbar{display:none}
 .short{width:110px;flex-shrink:0}
 .short.thumb{aspect-ratio:9/16;border-radius:12px}
 .short.title{font-size:12px;margin-top:6px;-webkit-line-clamp:2}
 .bottom{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid #222;display:flex;justify-content:space-around;padding:8px 0 20px;z-index:40}
 .bitem{display:flex;flex-direction:column;align-items:center;font-size:11px;color:var(--sub);gap:4px}
 .bitem.active{color:#fff}
 .bitem span{font-size:20px}
  #player{position:fixed;inset:0;background:#000;z-index:100;display:none;flex-direction:column}
  #player.show{display:flex}
  #player iframe{width:100%;aspect-ratio:16/9;border:0}
  #player.close{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.6);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px}
 .player-meta{padding:12px}
</style>
</head>
<body>
<header>
  <div class="top">
    <div class="logo"><span>▶</span> YouTube</div>
    <div class="actions">
      <div id="searchBtn">🔍</div>
      <div>📡</div>
      <div>🔔</div>
      <div class="avatar"></div>
    </div>
  </div>
  <div id="searchBar" hidden><input id="q" type="search" placeholder="Search YouTube" enterkeyhint="search"></div>
  <div class="chips" id="chips">
    <div class="chip active">All</div><div class="chip">Music</div><div class="chip">Gaming</div><div class="chip">News</div><div class="chip">Shorts</div><div class="chip">Live</div>
  </div>
</header>

<main id="feed"></main>

<nav class="bottom">
  <div class="bitem active" data-tab="home"><span>🏠</span>Home</div>
  <div class="bitem" data-tab="shorts"><span>▶️</span>Shorts</div>
  <div class="bitem" data-tab="create"><span>＋</span></div>
  <div class="bitem" data-tab="subs"><span>📺</span>Subs</div>
  <div class="bitem" data-tab="you"><span>👤</span>You</div>
</nav>

<div id="player">
  <div class="close" id="closeP">✕</div>
  <div id="pWrap"></div>
  <div class="player-meta" id="pMeta"></div>
</div>

<script>
// --- your key pool from before ---
const API_KEYS = ['AIzaSyCpw2u0mG3cYbH3PwAdjB7MOZB-1kdeRjo','AIzaSyAOBBJC3VvRsAQC2R-nenGvO23x--9SzB0','AIzaSyCxt2XsA80s67LNRTpgg-fBYqqHn2YgWDI','AIzaSyDHjpWZX7J9-39VM9Urb8LM102nr1H91GY','AIzaSyAivKVAqJkYqAkzX3lV1f8FiFlU-EchNYI','AIzaSyBFVv1THj4Q0jJvNJv9jfyUnYz8NG4eWRk','AIzaSyD4A2061bz3jVUjFg3Z8jsbgjiF7ii32h4','AIzaSyA1AKHRCe7aq8Bv4j6KqXTjmg9hS1Fc9ho'];
let k = parseInt(localStorage.ytk||'0');
async function yt(url){const key=API_KEYS[k];const r=await fetch(url+(url.includes('?')?'&':'?')+'key='+key);const d=await r.json();if(d.error){k=(k+1)%API_KEYS.length;localStorage.ytk=k;return yt(url)}localStorage.ytk=k;return d}

const feed=document.getElementById('feed');
const searchBtn=document.getElementById('searchBtn');
const searchBar=document.getElementById('searchBar');
const q=document.getElementById('q');

searchBtn.onclick=()=>{searchBar.hidden=!searchBar.hidden;if(!searchBar.hidden)q.focus()};
q.onkeydown=e=>{if(e.key==='Enter')doSearch(q.value)};

async function loadHome(){
  feed.innerHTML='';
  // Shorts shelf first
  const s=await yt('https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&maxResults=10&q=%23shorts&regionCode=US');
  const shelf=document.createElement('div'); shelf.className='shorts-shelf';
  shelf.innerHTML=`<div class="shorts-head"><div style="display:flex;align-items:center;gap:8px"><img src="https://www.gstatic.com/youtube/img/shorts/favicon.ico" width="20"><b>Shorts</b></div></div><div class="shorts-row" id="sr"></div>`;
  feed.appendChild(shelf);
  const sr=shelf.querySelector('#sr');
  s.items.forEach(v=>{const d=document.createElement('div');d.className='short';d.innerHTML=`<div class="thumb"><img src="https://i.ytimg.com/vi/${v.id.videoId}/hqdefault.jpg"></div><div class="title">${v.snippet.title}</div>`;d.onclick=()=>openPlayer(v.id.videoId,v.snippet);sr.appendChild(d)});

  // Main feed
  const d=await yt('https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&maxResults=20&regionCode=US');
  d.items.forEach(v=>addVideo(v));
}

function addVideo(v){
  const views=Number(v.statistics.viewCount).toLocaleString();
  const el=document.createElement('div');el.className='video';
  el.innerHTML=`<div class="thumb"><img src="${v.snippet.thumbnails.high?.url||v.snippet.thumbnails.medium.url}"><div class="duration">${fmt(v.contentDetails.duration)}</div></div>
  <div class="meta"><div class="av"></div><div class="info"><div class="title">${v.snippet.title}</div><div class="sub">${v.snippet.channelTitle} • ${views} views</div></div><div>⋮</div></div>`;
  el.onclick=()=>openPlayer(v.id, v.snippet);
  feed.appendChild(el);
}

function fmt(iso){const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);const h=m[1]?m[1]+':':'';const min=(m[2]||'0').padStart(h?2:1,'0');const s=(m[3]||'0').padStart(2,'0');return h+min+':'+s}

async function doSearch(term){
  if(!term)return; feed.innerHTML='<div style="padding:20px;color:#aaa">Searching…</div>';
  const d=await yt(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20&q=${encodeURIComponent(term)}`);
  feed.innerHTML=''; for(const it of d.items){const v=await yt(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${it.id.videoId}`); if(v.items[0])addVideo(v.items[0])}
  searchBar.hidden=true;
}

function openPlayer(id, sn){
  document.getElementById('player').classList.add('show');
  document.getElementById('pWrap').innerHTML=`<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&playsinline=1&rel=0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
  document.getElementById('pMeta').innerHTML=`<div class="title">${sn.title}</div><div class="sub">${sn.channelTitle}</div>`;
}
document.getElementById('closeP').onclick=()=>{document.getElementById('player').classList.remove('show');document.getElementById('pWrap').innerHTML=''};

// bottom nav
document.querySelectorAll('.bitem').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.bitem').forEach(x=>x.classList.remove('active'));b.classList.add('active');
  const t=b.dataset.tab; if(t==='home')loadHome(); if(t==='shorts')location.href='?tab=shorts'; if(t==='subs')feed.innerHTML='<div style="padding:40px;text-align:center;color:#aaa">Sign in to see subscriptions</div>';
});

loadHome();
</script>
</body>
</html>
