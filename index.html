<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, initial-scale=1.0, user-scalable=no">
<title>Meta Ray-Ban • YouTube</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
  body { display: flex; align-items: center; justify-content: center; }

  #app {
    width: 600px;
    height: 600px;
    background: #000;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid #1a1a1a;
    box-shadow: 0 0 40px rgba(0,0,0.8);
  }

  header {
    height: 56px;
    background: #000;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    flex-shrink: 0;
    position: relative;
    z-index: 20;
  }

 .logo {
    width: 28px;
    height: 20px;
    background: #FF0000;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    margin-right: 4px;
    flex-shrink: 0;
  }

 .tabs { display: flex; gap: 6px; flex: 1; overflow: hidden; }

 .tab {
    background: transparent;
    color: #888;
    border: none;
    padding: 8px 14px;
    border-radius: 18px;
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    transition: all.2s;
    height: 34px;
  }

 .tab.active {
    background: #fff;
    color: #000;
  }

 .quick-menu {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

 .quick-btn {
    background: #111;
    border: 1px solid #2a2a2a;
    color: #fff;
    padding: 7px 12px;
    border-radius: 16px;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }

 .live-dot {
    width: 6px;
    height: 6px;
    background: #FF0000;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

 .focusable { cursor: pointer; outline: none; border: 2px solid transparent; position: relative; }
 .focusable.focused {
    border-color: #FFD60A!important;
    box-shadow: 0 0 0 2px #000, 0 0 0 4px #FFD60A, 0 0 16px rgba(255,214,10,0.5);
    z-index: 10;
  }
 .tab.focusable.focused { box-shadow: 0 0 0 2px #000, 0 0 0 4px #FFD60A; }

  main {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
  }

 .view { position: absolute; inset: 0; overflow: hidden; }

 .video-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 12px;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    align-content: start;
  }

 .video-grid::-webkit-scrollbar { width: 0; }

 .video-card {
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform.15s;
  }

 .video-card.focused { transform: scale(1.02); }

 .thumb-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #111; overflow: hidden; }
 .video-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
 .duration {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,0.85);
    padding: 2px 5px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
 .live-badge {
    position: absolute;
    top: 6px;
    left: 6px;
    background: #FF0000;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 3px;
  }

 .video-info { padding: 8px 9px 10px; }
 .video-title {
    font-size: 13px;
    line-height: 1.35;
    font-weight: 500;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: #f1f1f1;
  }
 .video-channel {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #search-view { display: flex; flex-direction: column; height: 100%; }
  #search-input {
    margin: 12px;
    padding: 12px 16px;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 24px;
    color: #fff;
    font-size: 15px;
    flex-shrink: 0;
  }
  #search-input::placeholder { color: #666; }
  #search-results { flex: 1; overflow-y: auto; }

  #info-view {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }
 .info-card {
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    border-radius: 12px;
    padding: 16px;
  }
 .info-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
 .info-text { font-size: 13px; color: #aaa; line-height: 1.5; }
 .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
 .info-row:last-child { border: none; }
 .info-label { color: #888; }
 .info-value { color: #fff; font-family: monospace; }

  #player-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 20%, #000 100%);
    padding: 16px 12px 12px;
    border-top: 1px solid #222;
    display: flex;
    gap: 10px;
    align-items: center;
    z-index: 15;
    backdrop-filter: blur(10px);
  }

  #play-btn {
    background: #FF0000;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">▶</div>
    <div class="tabs">
      <button class="tab focusable active" data-tab="home">Home</button>
      <button class="tab focusable" data-tab="search">Search</button>
      <button class="tab focusable" data-tab="shorts">Shorts</button>
      <button class="tab focusable" data-tab="history">History</button>
      <button class="tab focusable" data-tab="account">Account</button>
    </div>
    <div class="quick-menu">
      <button class="quick-btn focusable" data-action="live"><span class="live-dot"></span>Live</button>
      <button class="quick-btn focusable" data-action="menu">⋮</button>
    </div>
  </header>

  <main>
    <div id="home-view" class="view">
      <div class="video-grid" id="grid"></div>
    </div>
    <div id="search-view" class="view" hidden>
      <input id="search-input" class="focusable" placeholder="Search YouTube" autocomplete="off">
      <div id="search-results" class="video-grid"></div>
    </div>
    <div id="info-view" class="view" hidden></div>

    <div id="player-bar" hidden>
      <button id="play-btn" class="focusable">▶ Play</button>
      <div style="flex:1;min-width:0">
        <div class="current-title" style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Select a video</div>
      </div>
    </div>
  </main>
</div>

<script>
const API_KEY = 'AIzaSyDPiJX_1AP0-350XEa32O1NIxrfhBWwGBk';
const DEMO_VIDEOS = [
  {id:'dQw4w9WgXcQ', title:'Rick Astley - Never Gonna Give You Up', channel:'Rick Astley', thumb:'https://i.ytimg.com/vi/dQw4w9WgXcQ/mqdefault.jpg'},
  {id:'jNQXAC9IVRw', title:'Me at the zoo', channel:'jawed', thumb:'https://i.ytimg.com/vi/jNQXAC9IVRw/mqdefault.jpg'},
  {id:'9bZkp7q19f0', title:'PSY - GANGNAM STYLE', channel:'officialpsy', thumb:'https://i.ytimg.com/vi/9bZkp7q19f0/mqdefault.jpg'},
  {id:'kJQP7kiw5Fk', title:'Luis Fonsi - Despacito', channel:'LuisFonsi', thumb:'https://i.ytimg.com/vi/kJQP7kiw5Fk/mqdefault.jpg'},
  {id:'3JZ_D3ELwOQ', title:'Mark Ronson - Uptown Funk ft. Bruno Mars', channel:'MarkRonsonVEVO', thumb:'https://i.ytimg.com/vi/3JZ_D3ELwOQ/mqdefault.jpg'},
  {id:'L_jWHffIx5E', title:'Smash Mouth - All Star', channel:'SmashMouthVEVO', thumb:'https://i.ytimg.com/vi/L_jWHffIx5E/mqdefault.jpg'}
];

let focusables = [], currentFocus = 0, currentTab = 'home', currentVideo = null, historyList = JSON.parse(localStorage.getItem('rb_yt_history')||'[]');

const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const esc = s => String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

function updateFocusables(){
  focusables = $$('.focusable').filter(el => {
    const style = getComputedStyle(el);
    return style.display!== 'none' && style.visibility!== 'hidden' &&!el.disabled && el.offsetParent;
  });
  focusables.forEach((el,i)=>el.dataset.focusIdx=i);
}

function setFocus(el){
  if(!el ||!focusables.includes(el)) return;
  focusables.forEach(f=>f.classList.remove('focused'));
  el.classList.add('focused');
  currentFocus = focusables.indexOf(el);
  try{ el.focus({preventScroll:true}); }catch{}
  el.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function moveFocus(dir){
  if(!focusables.length) return;
  currentFocus = (currentFocus + dir + focusables.length) % focusables.length;
  setFocus(focusables[currentFocus]);
}

document.addEventListener('keydown', e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    e.preventDefault();
    moveFocus(e.key==='ArrowUp'||e.key==='ArrowLeft'? -1 : 1);
  }
  if(e.key==='Enter'){ e.preventDefault(); document.activeElement?.click(); }
  if(e.key.toLowerCase()==='p'){ $('#play-btn')?.click(); }
});

function showStatus(msg, t=0){ /* status removed for brevity */ }

async function fetchVideos(type, query=''){
  const publishedAfter = new Date(Date.now()-7*24*3600*1000).toISOString();
  let url = '';
  if(type==='home'){
    url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&order=date&maxResults=24&publishedAfter=${encodeURIComponent(publishedAfter)}&regionCode=US&q=a&key=${API_KEY}`;
  }else if(type==='shorts'){
    url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&order=date&maxResults=24&publishedAfter=${encodeURIComponent(publishedAfter)}&q=shorts&key=${API_KEY}`;
  }else if(type==='live'){
    url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&eventType=live&maxResults=24&q=live&key=${API_KEY}`;
  }else if(type==='search'){
    url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=24&q=${encodeURIComponent(query)}&key=${API_KEY}`;
  }
  try{
    const r = await fetch(url);
    if(!r.ok) throw new Error('api');
    const data = await r.json();
    return data.items.map(it => ({
      id: it.id.videoId || it.id,
      title: it.snippet.title,
      channel: it.snippet.channelTitle,
      thumb: it.snippet.thumbnails?.medium?.url || it.snippet.thumbnails?.default?.url,
      isLive: type==='live'
    }));
  }catch(err){
    console.warn('Fetch failed:', err);
    return null;
  }
}

function renderGrid(videos, container) {
  container.innerHTML = '';
  if(!videos ||!videos.length) {
    container.innerHTML = `<div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;height:200px;color:#666">No videos found</div>`;
    updateFocusables();
    return;
  }

  videos.forEach(v => {
    const card = document.createElement('div');
    card.className = 'video-card focusable';
    card.tabIndex = 0;
    card.dataset.id = v.id;
    card.innerHTML = `
      <div class="thumb-wrap">
        <img class="video-thumb" src="${v.thumb}" alt="" loading="lazy">
        ${v.isLive? '<div class="live-badge"><span class="live-dot"></span>LIVE</div>' : ''}
      </div>
      <div class="video-info">
        <div class="video-title">${esc(v.title)}</div>
        <div class="video-channel">${esc(v.channel)}</div>
      </div>
    `;
    card.addEventListener('click', () => selectVideo(v));
    container.appendChild(card);
  });
  updateFocusables();
}

function selectVideo(v) {
  currentVideo = v;
  $('#player-bar').hidden = false;
  $('.current-title').textContent = v.title;
  setFocus($('#play-btn'));
}

function playCurrent() {
  if(!currentVideo) return;
  const url = `https://m.youtube.com/watch?v=${currentVideo.id}`;
  window.open(url, '_blank');
  addToHistory(currentVideo);
}

function addToHistory(v) {
  historyList = historyList.filter(h => h.id!== v.id);
  historyList.unshift({...v, watchedAt: new Date().toISOString()});
  historyList = historyList.slice(0, 50);
  localStorage.setItem('rb_yt_history', JSON.stringify(historyList));
}

async function loadHome() {
  const videos = await fetchVideos('home');
  renderGrid(videos || DEMO_VIDEOS, $('#grid'));
}

async function loadShorts() {
  const videos = await fetchVideos('shorts');
  renderGrid(videos || DEMO_VIDEOS.filter((_,i)=>i<4), $('#grid'));
}

async function loadLive() {
  switchTab('home');
  const videos = await fetchVideos('live');
  renderGrid(videos || DEMO_VIDEOS.slice(0,2), $('#grid'));
}

async function doSearch(q) {
  if(!q.trim()) return;
  const videos = await fetchVideos('search', q);
  renderGrid(videos || DEMO_VIDEOS, $('#search-results'));
}

function showHistory() {
  $('#home-view').hidden = false;
  $('#search-view').hidden = true;
  $('#info-view').hidden = true;
  renderGrid(historyList, $('#grid'));
  if(!historyList.length) {
    $('#grid').innerHTML = `<div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;height:300px;color:#666;flex-direction:column;gap:12px"><div style="font-size:48px">🕒</div><div>No watch history</div></div>`;
  }
  updateFocusables();
}

function showAccount() {
  $('#home-view').hidden = true;
  $('#search-view').hidden = true;
  $('#info-view').hidden = false;
  $('#player-bar').hidden = true;

  $('#info-view').innerHTML = `
    <div class="info-card">
      <div class="info-title">Meta Ray-Ban Display</div>
      <div class="info-text">YouTube client optimized for 600×600 wearable display. Navigate with D-pad. Press Enter to select, P to play.</div>
    </div>
    <div class="info-card">
      <div class="info-title">Connection</div>
      <div class="info-row"><span class="info-label">API Status</span><span class="info-value" style="color:#4ade80">Connected</span></div>
      <div class="info-row"><span class="info-label">Region</span><span class="info-value">US</span></div>
      <div class="info-row"><span class="info-label">Key</span><span class="info-value">${API_KEY.slice(0,8)}...${API_KEY.slice(-4)}</span></div>
    </div>
  `;
  updateFocusables();
}

function switchTab(tab) {
  currentTab = tab;
  $$('.tab').forEach(t => {
    const active = t.dataset.tab === tab;
    t.classList.toggle('active', active);
    t.setAttribute('aria-selected', active);
  });

  $('#home-view').hidden =!(tab==='home' || tab==='shorts' || tab==='history');
  $('#search-view').hidden = tab!== 'search';
  $('#info-view').hidden = tab!== 'account';

  $('#player-bar').hidden = tab === 'account' || tab === 'search' ||!currentVideo;

  if(tab === 'home') loadHome();
  else if(tab === 'shorts') loadShorts();
  else if(tab === 'history') showHistory();
  else if(tab === 'account') showAccount();

  updateFocusables();
}

$$('[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

$('[data-action="live"]').addEventListener('click', loadLive);
$('#play-btn').addEventListener('click', playCurrent);

$('#search-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') {
    e.preventDefault();
    doSearch(e.target.value);
  }
});

// Initialize
window.addEventListener('load', () => {
  updateFocusables();
  switchTab('home');
  setTimeout(() => {
    setFocus($('[data-tab="home"]'));
  }, 300);
});
</script>
</body>
</html>
