<!DOCTYPE html>
<html>
<body style="background:#000;color:#fff;font-family:system-ui;margin:0">
<div style="display:flex" id="tabs">
  <button class="t" style="flex:1;padding:18px;background:#111;border:0;color:#777">Home</button>
  <button class="t" style="flex:1;padding:18px;background:#111;border:0;color:#777">Search</button>
  <button class="t" style="flex:1;padding:18px;background:#111;border:0;color:#777">Menu</button>
</div>

<div id="list" style="padding:10px"></div>

<div id="player" style="display:none;position:absolute;inset:0;background:#000;flex-direction:column">
  <iframe id="yt" style="flex:1;border:0" allowfullscreen></iframe>
  <button id="back" style="padding:20px;background:#222;color:#fff;border:0">← Back</button>
</div>

<script>
let mode='tabs', fi=0;
const tabs=[...document.querySelectorAll('.t')];
const videos=[
  {id:'dQw4w9WgXcQ',title:'Never Gonna Give You Up'},
  {id:'9bZkp7q19f0',title:'Gangnam Style'},
  {id:'jNQXAC9IVRw',title:'Me at the zoo'}
];

function focus(){
  document.querySelectorAll('.focus').forEach(e=>e.classList.remove('focus'));
  let list = mode==='tabs'? tabs : [...document.querySelectorAll('.card')];
  if(!list.length) return;
  fi = Math.max(0, Math.min(fi, list.length-1));
  list[fi].classList.add('focus');
  list[fi].style.outline='3px solid yellow';
}

function loadHome(){
  const L=document.getElementById('list'); L.innerHTML='';
  videos.forEach(v=>{
    const d=document.createElement('div');
    d.className='card';
    d.style.cssText='display:flex;gap:10px;padding:10px;border-bottom:1px solid #222';
    d.innerHTML=`<img src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg" width="160" height="90"><div>${v.title}</div>`;
    d.onclick=()=>play(v.id);
    L.appendChild(d);
  });
}

function play(id){
  document.getElementById('player').style.display='flex';
  document.getElementById('yt').src=`https://www.youtube.com/embed/${id}?autoplay=1`;
  mode='player';
}

document.getElementById('back').onclick=()=>{
  document.getElementById('player').style.display='none';
  document.getElementById('yt').src='';
  mode='list'; fi=0; focus();
};

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight' && mode==='tabs'){fi=(fi+1)%3;focus();}
  if(e.key==='ArrowLeft' && mode==='tabs'){fi=(fi+2)%3;focus();}
  if(e.key==='ArrowDown' && mode==='tabs' && tabs[fi].textContent==='Home'){
    loadHome(); mode='list'; fi=0; setTimeout(focus,0);
  }
  if(e.key==='ArrowUp' && mode==='list' && fi===0){mode='tabs';fi=0;focus();}
  if(e.key==='ArrowDown' && mode==='list'){fi=Math.min(fi+1,2);focus();}
  if(e.key==='ArrowUp' && mode==='list' && fi>0){fi--;focus();}
  if(e.key==='Enter'){
    if(mode==='tabs' && tabs[fi].textContent==='Home'){loadHome();mode='list';fi=0;focus();}
    if(mode==='list') document.querySelectorAll('.card')[fi].click();
  }
});

// start
tabs[0].style.color='#fff'; focus();
</script>
</body>
</html>
