<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="ray-ban-display" content="true">
<title>YouTube</title>
<link rel="manifest" href="/manifest.json">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:#0f0f0f;color:#fff;font-family:Roboto,Arial,sans-serif;overflow:hidden}
  /* TOP BAR - like m.youtube */
  #top{position:fixed;top:0;left:0;right:0;height:48px;background:#0f0f0f;display:flex;align-items:center;padding:0 12px;gap:12px;z-index:30;border-bottom:1px solid #222}
  #logo{width:90px;height:20px;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 20"><path fill="%23fff" d="M27.97 3.48v13.04h-2.6v-1.7c-.6 1.3-2.1 2-3.6 2-3.3 0-5.8-2.7-5.8-6.5s2.5-6.5 5.8-6.5c1.5 0 3 .7 3.6 1.9V3.5h2.6zM19.6 10.3c0 2.2 1.4 3.8 3.3 3.8 1.9 0 3.3-1.6 3.3-3.8s-1.4-3.8-3.3-3.8c-1.9 0-3.3 1.6-3.3 3.8z"/></svg>') no-repeat center/contain}
  #search{flex:1;background:#121212;border:1px solid #303030;border-radius:20px;padding:8px 14px;color:#fff;font-size:14px;outline:none}
  /* FEED */
  #home{position:absolute;top:48px;bottom:56px;left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .v{margin-bottom:12px}
  .thumb{position:relative;width:100%;aspect-ratio:16/9;background:#000}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .meta{display:flex;padding:8px 12px;gap:10px}
  .av{width:36px;height:36px;border-radius:50%;background:#333;flex-shrink:0}
  .ti{font-size:14px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ch{font-size:12px;color:#aaa;margin-top:2px}
  /* SHORTS */
  #shorts{position:fixed;inset:0;background:#000;display:none;z-index:40}
  #shorts.on{display:block}
  .s-item{width:100%;height:100vh;position:relative}
  .s-item iframe{width:100%;height:100%;border:0}
  .s-ui{position:absolute;bottom:80px;left:12px;color:#fff;text-shadow:0 1px 2px #000}
  /* BOTTOM NAV */
  #nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:#0f0f0f;border-top:1px solid #222;display:flex;justify-content:space-around;align-items:center;z-index:30}
  .n{font-size:11px;color:#aaa;text-align:center}.n.on{color:#fff}
</style>
</head>
<body>
<div id="top"><div id="logo"></div><input id="search" type="search" inputmode="search" placeholder="Search" enterkeyhint="search"></div>
<div id="home"></div>
<div id="shorts"></div>
<div id="nav"><div class="n on" data-p="home">Home</div><div class="n" data-p="shorts">Shorts</div></div>

<script>
// --- CONFIG ---
const API_KEY='AIzaSyCpw2u0mG3cYbH3PwAdjB7MOZB-1kdeRjo'; // replace if quota hits
const START_SHORT='ckzUY_Dxp_g';

// --- Ray-Ban ---
if(window.RayBanDisplay){
  const rb=new RayBanDisplay({cursor:true,gesture:true});
  rb.on('tap',e=>{const el=document.elementFromPoint(e.x,e.y);if(el?.tagName==='INPUT')el.focus();else el?.click()});
  rb.on('swipe',d=>{if(shorts.classList.contains('on')){curShort+=d==='up'?-1:1;loadShort()}else{home.scrollBy({top:d==='up'?-300:300,behavior:'smooth'})}});
}

const home=document.getElementById('home'),shorts=document.getElementById('shorts');
let shortsList=[START_SHORT],curShort=0;

// HOME - like m.youtube.com
async function loadHome(){
  const r=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&maxResults=15&regionCode=US&key=${API_KEY}`);
  const j=await r.json();home.innerHTML='';
  j.items.forEach(v=>{
    const d=document.createElement('div');d.className='v';
    d.innerHTML=`<div class="thumb"><img src="${v.snippet.thumbnails.medium.url}" loading="lazy"></div>
    <div class="meta"><div class="av"></div><div><div class="ti">${v.snippet.title}</div><div class="ch">${v.snippet.channelTitle}</div></div></div>`;
    d.onclick=()=>window.open(`https://m.youtube.com/watch?v=${v.id}`,'_blank');
    home.appendChild(d);
  });
}

// SHORTS - starts on your ID
async function initShorts(){
  const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&maxResults=20&q=shorts&key=${API_KEY}`);
  const j=await r.json();shortsList=[START_SHORT,...j.items.map(i=>i.id.videoId)];
}
function loadShort(){
  curShort=Math.max(0,Math.min(shortsList.length-1,curShort));
  shorts.innerHTML=`<div class="s-item"><iframe src="https://www.youtube.com/embed/${shortsList[curShort]}?autoplay=1&playsinline=1&mute=0" allow="autoplay;fullscreen"></iframe><div class="s-ui">▲▼ swipe for next</div></div>`;
}

// NAV
document.querySelectorAll('.n').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.n').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  if(b.dataset.p==='home'){shorts.classList.remove('on');home.style.display='block'}else{home.style.display='none';shorts.classList.add('on');if(shortsList.length===1)initShorts().then(loadShort);else loadShort()}
});

document.getElementById('search').onkeydown=e=>{if(e.key==='Enter')location.href=`https://m.youtube.com/results?search_query=${encodeURIComponent(e.target.value)}`};

loadHome();
if('serviceWorker'in navigator)navigator.serviceWorker.register('/service-worker.js');
</script>
</body>
</html>
