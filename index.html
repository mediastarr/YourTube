<!DOCTYPE html>
<html>
<body style="background:#000;color:#fff;font-family:system-ui">
<div style="display:flex;gap:10px;padding:20px" id="tabs">
  <button class="t" style="padding:20px">Home</button>
  <button class="t" style="padding:20px">Search</button>
  <button class="t" style="padding:20px">Menu</button>
</div>
<script>
let i=0; const btns=[...document.querySelectorAll('.t')];
function focus(){btns.forEach(b=>b.style.outline='');btns[i].style.outline='3px solid yellow';}
focus();
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') i=(i+1)%3;
  if(e.key==='ArrowLeft') i=(i+2)%3;
  if(e.key==='Enter') alert('Clicked '+btns[i].textContent);
  focus();
});
</script>
</body>
</html>
