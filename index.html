<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, initial-scale=1">
<title>Herald • YouTube for Ray-Ban Display</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<style>
:root{--yellow:#FFD400}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:#111}
body{display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.app{width:600px;height:600px;background:#000;color:#fff;display:flex;flex-direction:column;position:relative;overflow:hidden;border:1px solid #222}
header{height:56px;display:flex;align-items:center;padding:0 18px;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.logo{font-weight:900;font-size:22px;letter-spacing:.5px}
.logo span{color:var(--yellow)}
.tabbar{display:flex;gap:2px;padding:0 6px;border-bottom:1px solid #1a1a1a;height:48px;align-items:center;flex-shrink:0;background:#000}
.tab{background:transparent;border:none;color:#999;font-size:17px;padding:10px 9px;font-weight:700;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;letter-spacing:.2px}
.tab.active{color:var(--yellow);border-bottom-color:var(--yellow)}
#view{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;background:#000}
#view::-webkit-scrollbar{width:0}
.section-title{padding:14px 16px 8px;font-size:14px;text-transform:uppercase;letter-spacing:1.2px;color:#888;font-weight:800}
.list{padding:0 8px 16px}
.video-item{width:100%;display:flex;gap:12px;padding:10px;background:#080808;border:2px solid #141414;border-radius:14px;margin-bottom:10px;text-align:left;color:inherit;cursor:pointer;transition:background.15s,border-color.15s}
.video-item img{width:168px;height:94px;object-fit:cover;border-radius:9px;background:#222;flex-shrink:0}
.video-item.meta{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.video-item.title{font-size:18px;line-height:1.28;font-weight:700;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.video-item.channel{font-size:14px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.video-item.focused{border-color:var(--yellow);background:#141414}
.search-box{padding:16px;display:flex;gap:8px}
#searchInput{flex:1;background:#0d0d0d;border:2px solid #2a2a2a;color:#fff;font-size:21px;padding:13px 14px;border-radius:12px;font-weight:600}
#searchInput.focused{border-color:var(--yellow)}
.search-btn{background:var(--yellow);color:#000;border:none;font-weight:900;font-size:18px;padding:0 22px;border-radius:12px;cursor:pointer;letter-spacing:.3px}
.search-btn.focused{filter:brightness(1.1)}
.empty{text-align:center;padding:90px 20px;color:#666;font-size:20px;font-weight:600}
.account{display:flex;flex-direction:column;align-items:center;padding-top:64px;gap:12px}
.avatar{width:100px;height:100px;border-radius:50%;background:#141414;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:900;color:var(--yellow);border:3px solid #2a2a2a}
.name{font-size:26px;font-weight:800;margin-top:8px}
.email{color:#999;font-size:16px}
.signout{margin-top:26px;background:#111;border:2px solid #2a2a2a;color:#fff;padding:13px 30px;border-radius:12px;font-size:18px;font-weight:700}
.signout.focused{border-color:var(--yellow);background:#1a1a1a}
#detail{position:absolute;inset:0;background:#000;z-index:20;display:none;flex-direction:column}
#detail.open{display:flex}
.detail-hero{position:relative;width:100%;height:280px;background:#000;flex-shrink:0}
.detail-hero img{width:100%;height:100%;object-fit:cover}
.detail-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,#000 0%,rgba(0,0,0,.6) 30%,transparent 70%)}
.detail-body{padding:20px;flex:1;overflow:auto}
.detail-title{font-size:25px;font-weight:900;line-height:1.25;margin-bottom:10px}
.detail-channel{color:#aaa;font-size:16px;margin-bottom:22px;font-weight:600}
.detail-actions{display:flex;gap:10px}
.detail-btn{background:#141414;border:2px solid #2a2a2a;color:#fff;padding:13px 20px;border-radius:12px;font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px;cursor:pointer}
.detail-btn.primary{background:var(--yellow);color:#000;border-color:var(--yellow)}
.detail-btn.focused{border-color:var(--yellow)}
#quickmenu{position:absolute;inset:0;background:rgba(0,0,0,.92);z-index:50;display:flex;align-items:center;justify-content:center}
#quickmenu.hidden{display:none}
.menu{width:80%;background:#000;border:3px solid var(--yellow);border-radius:18px;padding:18px;display:flex;flex-direction:column;gap:12px;box-shadow:0 0 40px rgba(255,212,0,.2)}
.menu-title{text-align:center;font-weight:900;font-size:19px;margin-bottom:6px;color:var(--yellow);letter-spacing:1.5px}
.menu-btn{background:#0a0a0a;border:2px solid #2e2e2e;color:#fff;padding:15px;border-radius:12px;font-size:19px;font-weight:700;text-align:center;cursor:pointer}
.menu-btn.focused{border-color:var(--yellow);background:#171717}
footer{height:30px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#666;border-top:1px solid #141414;flex-shrink:0;letter-spacing:.5px;background:#000}
.focusable{outline:none;position:relative}
.focusable.focused{box-shadow:0 0 0 3px #000,0 0 0 5px var(--yellow);z-index:5}
.tab.focusable.focused{box-shadow:inset 0 -3px 0 var(--yellow),0 0 0 3px #000,0 0 0 5px var(--yellow);border-radius:6px 6px 0 0}
/* Contrast */
.app.contrast{background:#fff;color:#000}
.app.contrast.tabbar,.app.contrast header,.app.contrast footer,.app.contrast #view{background:#fff;border-color:#ddd}
.app.contrast.tab{color:#555}
.app.contrast.tab.active{color:#000;border-bottom-color:#000}
.app.contrast.section-title{color:#666}
.app.contrast.video-item{background:#f7f7f7;border-color:#e6e6e6}
.app.contrast.video-item.focused{background:#fff;border-color:#000}
.app.contrast.video-item.channel{color:#555}
.app.contrast #searchInput{background:#fff;border-color:#bbb;color:#000}
.app.contrast.search-btn{background:#000;color:var(--yellow)}
.app.contrast.empty{color:#777}
.app.contrast.avatar{background:#f0f0f0;border-color:#ccc;color:#000}
.app.contrast.signout{background:#fff;border-color:#000;color:#000}
.app.contrast.signout.focused{background:#f5f5f5}
.app.contrast #detail{background:#fff}
.app.contrast.detail-hero::after{background:linear-gradient(to top,#fff 0%,rgba(255,255,255,.7) 30%,transparent 70%)}
.app.contrast.detail-btn{background:#f0f0f0;border-color:#ccc;color:#000}
.app.contrast.detail-btn.primary{background:#000;color:var(--yellow);border-color:#000}
.app.contrast.menu{background:#fff;border-color:#000;box-shadow:0 0 30px rgba(0,0,0,.15)}
.app.contrast.menu-btn{background:#f7f7f7;border-color:#ccc;color:#000}
.app.contrast.menu-btn.focused{border-color:#000;background:#fff}
.app.contrast.menu-title{color:#000}
.app.contrast.focusable.focused{box-shadow:0 0 0 3px #fff,0 0 0 5px #000}
.app.contrast.tab.focusable.focused{box-shadow:inset 0 -3px 0 #000,0 0 0 3px #fff,0 0 0 5px #000}
</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <div class="logo">HERALD <span>• YouTube</span></div>
  </header>
  <nav class="tabbar" role="tablist">
    <button class="tab focusable active" data-tab="home" aria-selected="true">Home</button>
    <button class="tab focusable" data-tab="search">Search</button>
    <button class="tab focusable" data-tab="shorts">Shorts</button>
    <button class="tab focusable" data-tab="history">History</button>
    <button class="tab focusable" data-tab="account">Account</button>
    <button class="tab focusable" data-tab="menu" aria-label="Menu">⋮</button>
  </nav>
  <main id="view" tabindex="-1"></main>
  <div id="detail" aria-hidden="true"></div>
  <div id="quickmenu" class="hidden" aria-hidden="true">
    <div class="menu" role="dialog" aria-label="Quick Menu">
      <div class="menu-title">QUICK MENU</div>
      <button class="menu-btn focusable" data-action="home">Home</button>
      <button class="menu-btn focusable" data-action="contrast">Contrast</button>
      <button class="menu-btn focusable" data-action="back">Go back</button>
      <button class="menu-btn focusable" data-action="live">Live</button>
      <button class="menu-btn focusable" data-action="close">Close</button>
    </div>
  </div>
  <footer>D-Pad: Navigate • OK: Select • Neural Band Ready</footer>
</div>
<script>
const API_KEY='AIzaSyCpw2u0mG3cYbH3PwAdjB7MOZB-1kdeRjo';
const DEMO_VIDEOS=[
  {id:'dQw4w9WgXcQ',title:'Never Gonna Give You Up - Official Video',channel:'Rick Astley',thumb:'https://i.ytimg.com/vi/dQw4w9WgXcQ/mqdefault.jpg'},
  {id:'jNQXAC9IVRw',title:'Me at the zoo',channel:'jawed',thumb:'https://i.ytimg.com/vi/jNQXAC9IVRw/mqdefault.jpg'},
  {id:'9bZkp7q19f0',title:'PSY - GANGNAM STYLE',channel:'officialpsy',thumb:'https://i.ytimg.com/vi/9bZkp7q19f0/mqdefault.jpg'},
  {id:'kJQP7kiw5Fk',title:'Luis Fonsi - Despacito ft. Daddy Yankee',channel:'LuisFonsi',thumb:'https://i.ytimg.com/vi/kJQP7kiw5Fk/mqdefault.jpg'},
  {id:'3JZ_D3ELwOQ',title:'Mark Ronson - Uptown Funk ft. Bruno Mars',channel:'MarkRonsonVEVO',thumb:'https://i.ytimg.com/vi/3JZ_D3ELwOQ/mqdefault.jpg'},
  {id:'L_jWHffIx5E',title:'Nirvana - Smells Like Teen Spirit',channel:'Nirvana',thumb:'https://i.ytimg.com/vi/L_jWHffIx5E/mqdefault.jpg'},
  {id:'fJ9rUzIMcZQ',title:'Queen – Bohemian Rhapsody',channel:'Queen Official',thumb:'https://i.ytimg.com/vi/fJ9rUzIMcZQ/mqdefault.jpg'},
  {id:'RgKAFK5djSk',title:'Wiz Khalifa - See You Again ft. Charlie Puth',channel:'Wiz Khalifa',thumb:'https://i.ytimg.com/vi/RgKAFK5djSk/mqdefault.jpg'}
];
let currentTab='home', focusables=[], focusIndex=0, detailOpen=false, quickMenuOpen=false, lastQuery=localStorage.getItem('herald_lastq')||'';
const app=document.getElementById('app'), view=document.getElementById('view'), detail=document.getElementById('detail'), quickmenu=document.getElementById('quickmenu');
const esc=s=>s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function rebuildFocus(){
  let els=[];
  const tabs=Array.from(document.querySelectorAll('.tabbar.tab'));
  if(quickMenuOpen){els=Array.from(quickmenu.querySelectorAll('.focusable'))}
  else if(detailOpen){els.push(...tabs,...Array.from(detail.querySelectorAll('.focusable')))}
  else{els.push(...tabs,...Array.from(view.querySelectorAll('.focusable')))}
  focusables=els; focusables.forEach(e=>e.setAttribute('tabindex','0'));
  focusIndex=0; if(focusables.length) setTimeout(()=>focusElement(0),0);
}
function focusElement(i){focusables.forEach(el=>el.classList.remove('focused')); const el=focusables[i]; if(!el) return; el.classList.add('focused'); el.focus({preventScroll:true}); el.scrollIntoView({block:'nearest',behavior:'smooth'}); focusIndex=i;}
function handleKey(e){const k=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter',' ']; if(!k.includes(e.key)) return; const isInput=document.activeElement&&document.activeElement.tagName==='INPUT'; if(isInput && e.key!=='Enter' &&!e.key.startsWith('Arrow')) return; e.preventDefault(); if(e.key==='ArrowDown'||e.key==='ArrowRight'){focusIndex=(focusIndex+1)%focusables.length; focusElement(focusIndex)} else if(e.key==='ArrowUp'||e.key==='ArrowLeft'){focusIndex=(focusIndex-1+focusables.length)%focusables.length; focusElement(focusIndex)} else if(e.key==='Enter'||e.key===' '){const el=focusables[focusIndex]; if(!el) return; if(isInput && e.key==='Enter'){doSearch(); return} if(el.tagName==='INPUT'){el.focus();return} el.click()}}
function setTab(name){if(name==='menu') return; currentTab=name; document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name)); closeDetail(); closeQuickMenu(); view.innerHTML=''; switch(name){case'home':loadPopular();break;case'search':renderSearch();break;case'shorts':loadShorts();break;case'history':renderHistory();break;case'account':renderAccount();break}}
function renderVideoList(videos,title=''){view.innerHTML=`${title?`<div class="section-title">${esc(title)}</div>`:''}<div class="list">${videos.map(v=>`<button class="video-item focusable" data-id="${v.id}"><img src="${v.thumb}" alt="" loading="lazy"><div class="meta"><div class="title">${esc(v.title)}</div><div class="channel">${esc(v.channel||'')}</div></div></button>`).join('')}</div>`; view.querySelectorAll('.video-item').forEach(b=>b.addEventListener('click',()=>{const v=videos.find(x=>x.id===b.dataset.id); if(v) openDetail(v)})); rebuildFocus()}
async function loadPopular(){view.innerHTML='<div class="empty">Loading…</div>'; try{const r=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics&chart=mostPopular&maxResults=12&regionCode=US&key=${API_KEY}`); if(!r.ok) throw 0; const j=await r.json(); const vids=j.items.map(i=>({id:i.id,title:i.snippet.title,channel:i.snippet.channelTitle,thumb:i.snippet.thumbnails.medium?.url||i.snippet.thumbnails.default.url})); renderVideoList(vids,'Trending Now')}catch{renderVideoList(DEMO_VIDEOS,'Trending Now')}}
async function loadShorts(){view.innerHTML='<div class="empty">Loading Shorts…</div>'; try{const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&maxResults=12&q=shorts&key=${API_KEY}`); const j=await r.json(); const vids=(j.items||[]).map(i=>({id:i.id.videoId,title:i.snippet.title,channel:i.snippet.channelTitle,thumb:i.snippet.thumbnails.medium?.url})); renderVideoList(vids,'Shorts')}catch{renderVideoList(DEMO_VIDEOS,'Shorts')}}
async function loadLive(){view.innerHTML='<div class="empty">Loading Live…</div>'; try{const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&eventType=live&type=video&maxResults=12&key=${API_KEY}`); const j=await r.json(); const vids=(j.items||[]).map(i=>({id:i.id.videoId,title:i.snippet.title,channel:i.snippet.channelTitle,thumb:i.snippet.thumbnails.medium?.url})); renderVideoList(vids,'Live Now')}catch{renderVideoList(DEMO_VIDEOS,'Live Now')}}
function renderSearch(){view.innerHTML=`<div class="search-box"><input id="searchInput" class="focusable" type="text" placeholder="Search YouTube" autocomplete="off"><button id="searchBtn" class="focusable search-btn">Search</button></div><div id="searchResults"><div class="empty">Enter query and press Search</div></div>`; const inp=document.getElementById('searchInput'); inp.value=lastQuery; document.getElementById('searchBtn').onclick=doSearch; inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doSearch()}}); rebuildFocus(); if(lastQuery) doSearch()}
async function doSearch(){const inp=document.getElementById('searchInput'); if(!inp) return; const q=(inp.value||'').trim()||'tech'; lastQuery=q; localStorage.setItem('herald_lastq',q); const res=document.getElementById('searchResults'); res.innerHTML='<div class="empty">Searching…</div>'; let vids=[]; try{const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=12&q=${encodeURIComponent(q)}&key=${API_KEY}`); const j=await r.json(); vids=(j.items||[]).map(i=>({id:i.id.videoId,title:i.snippet.title,channel:i.snippet.channelTitle,thumb:i.snippet.thumbnails.medium?.url}))}catch{vids=DEMO_VIDEOS} res.innerHTML=`<div class="section-title">Results</div><div class="list">${vids.map(v=>`<button class="video-item focusable" data-id="${v.id}"><img src="${v.thumb}" alt=""><div class="meta"><div class="title">${esc(v.title)}</div><div class="channel">${esc(v.channel||'')}</div></div></button>`).join('')}</div>`; res.querySelectorAll('.video-item').forEach(b=>b.addEventListener('click',()=>{const v=vids.find(x=>x.id===b.dataset.id);if(v)openDetail(v)})); rebuildFocus()}
function renderHistory(){const h=JSON.parse(localStorage.getItem('herald_history')||'[]'); if(!h.length){view.innerHTML='<div class="empty">No history yet</div>'; rebuildFocus(); return} renderVideoList(h,'Recently Watched')}
function renderAccount(){view.innerHTML=`<div class="account"><div class="avatar">RF</div><div class="name">Regal Fleury</div><div class="email">regal@meta.com</div><button class="focusable signout">Sign out</button></div>`; view.querySelector('.signout').onclick=()=>{}; rebuildFocus()}
function openDetail(v){saveHistory(v); detailOpen=true; detail.innerHTML=`<div class="detail-hero"><img src="${(v.thumb||'').replace('mqdefault','hqdefault')}" alt=""></div><div class="detail-body"><div class="detail-title">${esc(v.title)}</div><div class="detail-channel">${esc(v.channel||'')}</div><div class="detail-actions"><button class="detail-btn primary focusable" id="playBtn">▶ Play</button><button class="detail-btn focusable" id="backBtn">← Back</button></div></div>`; detail.classList.add('open'); detail.setAttribute('aria-hidden','false'); document.getElementById('backBtn').onclick=closeDetail; document.getElementById('playBtn').onclick=()=>window.open(`https://youtube.com/watch?v=${v.id}`,'_blank'); rebuildFocus()}
function closeDetail(){detailOpen=false; detail.classList.remove('open'); detail.setAttribute('aria-hidden','true'); rebuildFocus()}
function saveHistory(v){let h=JSON.parse(localStorage.getItem('herald_history')||'[]'); h=h.filter(x=>x.id!==v.id); h.unshift(v); if(h.length>20) h=h.slice(0,20); localStorage.setItem('herald_history',JSON.stringify(h))}
function openQuickMenu(){quickMenuOpen=true; quickmenu.classList.remove('hidden'); quickmenu.setAttribute('aria-hidden','false'); rebuildFocus()}
function closeQuickMenu(){quickMenuOpen=false; quickmenu.classList.add('hidden'); quickmenu.setAttribute('aria-hidden','true'); rebuildFocus()}
function toggleContrast(){app.classList.toggle('contrast'); localStorage.setItem('herald_contrast',app.classList.contains('contrast')?'1':'0')}
function handleGoBack(){if(detailOpen){closeDetail()} else if(currentTab!=='home'){setTab('home')} closeQuickMenu()}
window.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('herald_contrast')==='1') app.classList.add('contrast');
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{const tab=t.dataset.tab; if(tab==='menu'){openQuickMenu()} else{setTab(tab)}}));
  document.querySelectorAll('#quickmenu.menu-btn').forEach(b=>b.addEventListener('click',async()=>{const a=b.dataset.action; if(a==='home'){setTab('home');closeQuickMenu()} else if(a==='contrast'){toggleContrast()} else if(a==='back'){handleGoBack()} else if(a==='live'){closeQuickMenu(); setTab('home'); await loadLive()} else if(a==='close'){closeQuickMenu()}}));
  document.addEventListener('keydown',handleKey);
  setTab('home');
});
</script>
</body>
</html>
