<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="ray-ban-display" content="true">
<title>YouTube — Ray-Ban</title>
<link rel="manifest" href="/manifest.json">
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:Roboto,system-ui}
  #yt{position:fixed;inset:0;width:100%;height:100%;border:0;background:#000}
  .ui{position:fixed;left:50%;transform:translateX(-50%);z-index:20;transition:opacity .3s}
  #tabs{bottom:8%;display:flex;gap:10px;background:rgba(15,15,15,.85);backdrop-filter:blur(12px);border:1px solid #272727;padding:8px 14px;border-radius:28px}
  .tab{color:#aaa;font-size:13px;padding:6px 12px;border-radius:18px}
  .tab.active{color:#fff;background:#272727}
  .rb-cursor{position:fixed;width:26px;height:26px;border:2px solid #3ea6ff;border-radius:50%;pointer-events:none;z-index:9999;display:none;box-shadow:0 0 8px #3ea6ff}
  .hidden{opacity:0;pointer-events:none}
</style>
</head>
<body>
<div class="rb-cursor" id="cur"></div>
<iframe id="yt" src="https://m.youtube.com/?ra=m" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; clipboard-write" referrerpolicy="origin" loading="eager"></iframe>

<div class="ui" id="tabs">
  <div class="tab active" data-go="home">Home</div>
  <div class="tab" data-go="shorts">Shorts</div>
</div>

<script>
// --- Ray-Ban Meta Glasses ---
let rb=null;
if(window.RayBanDisplay){
  rb=new RayBanDisplay({cursor:true,gesture:true,voice:true,haptic:true});
  const cur=document.getElementById('cur');cur.style.display='block';
  rb.on('move',(x,y)=>{cur.style.left=x+'px';cur.style.top=y+'px'});
  rb.on('tap',e=>{document.getElementById('yt').focus();rb.haptic(6)});
  rb.on('swipe',d=>{ /* let YouTube handle native scroll */ });
  rb.on('voice',t=>{if(t.includes('home'))goHome();if(t.includes('shorts'))goShorts()});
}

const yt=document.getElementById('yt');
const tabs=document.getElementById('tabs');

function goHome(){
  yt.src='https://m.youtube.com/?ra=m';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.go==='home'));
  tabs.classList.remove('hidden');
}
function goShorts(){
  yt.src='https://m.youtube.com/shorts/8WylF542tR4?ra=m';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.go==='shorts'));
  // auto-hide UI for immersive Shorts after 2s
  setTimeout(()=>tabs.classList.add('hidden'),2000);
}

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>b.dataset.go==='home'?goHome():goShorts());

// tap anywhere to show UI again in Shorts
document.addEventListener('click',()=>{if(tabs.classList.contains('hidden')){tabs.classList.remove('hidden');setTimeout(()=>tabs.classList.add('hidden'),3000)}});

// PWA
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('/service-worker.js'))}
</script>
</body>
</html>
