<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#000000">
<meta name="ray-ban-display" content="true">
<title>YouTube</title>
<link rel="manifest" href="/manifest.json">
<style>
  html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
  button{width:80%;max-width:320px;padding:18px;font-size:18px;border-radius:14px;border:0;background:#ff0000;color:#fff;font-weight:600}
  .hint{color:#888;font-size:13px;text-align:center;padding:0 20px}
</style>
</head>
<body>
  <button id="home">Open YouTube Home</button>
  <button id="shorts">Open Shorts</button>
  <div class="hint">Say "home" or "shorts" • D-pad scrolls normally</div>

<script>
// Ray-Ban voice + tap
if(window.RayBanDisplay){
  const rb=new RayBanDisplay({voice:true,haptic:true});
  rb.on('voice',t=>{
    if(t.includes('home'))location.href='https://m.youtube.com/?ra=m';
    if(t.includes('shorts'))location.href='https://m.youtube.com/shorts/8WylF542tR4?ra=m';
  });
}
document.getElementById('home').onclick=()=>location.href='https://m.youtube.com/?ra=m';
document.getElementById('shorts').onclick=()=>location.href='https://m.youtube.com/shorts/8WylF542tR4?ra=m';

// auto-launch home after 1s (remove if you want the menu)
setTimeout(()=>location.href='https://m.youtube.com/?ra=m',1000);

if('serviceWorker'in navigator)navigator.serviceWorker.register('/service-worker.js');
</script>
</body>
</html>
