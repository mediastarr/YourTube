<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=600,height=600,user-scalable=no">
<title>Herald</title>
<style>
*{box-sizing:border-box;margin:0}html,body{height:100%;background:#000;color:#fff;font-family:system-ui,Arial}
#app{width:600px;height:600px;background:#000;display:flex;flex-direction:column;overflow:hidden}
.tabs{height:48px;display:flex;background:#000;border-bottom:1px solid #222}
.tab{flex:1;background:0;border:0;color:#888;font:600 15px system-ui}
.tab.active{color:#fff}
.list{flex:1;overflow-y:auto;background:#000}
.card{height:96px;display:flex;align-items:center;gap:12px;padding:0 8px;border-bottom:1px solid #111}
.card img{width:160px;height:90px;background:#111;object-fit:cover}
.info{flex:1;min-width:0}
.t{font:700 16px/20px system-ui;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.c{color:#999;font:13px system-ui;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.focus{box-shadow:inset 0 3px #ff0!important}
#player{position:absolute;inset:48px 0 0;background:#000;display:none;flex-direction:column}
#player.show{display:flex}
#yt{width:600px;height:340px;background:#000}
#yt iframe{width:100%;height:100%;border:0}
.ctrls{display:flex;gap:6px;padding:10px;background:#000;border-top:1px solid #222}
.btn{flex:1;background:#1a1a1a;border:0;color:#fff;padding:12px;border-radius:8px;font:700 14px system-ui}
#searchUI{position:absolute;inset:48px 0 0;background:#000;display:none;flex-direction:column}
#searchUI.show{display:flex}
#q{margin:12px;background:#111;border:1px solid #333;color:#fff;padding:14px;border-radius:24px;font:16px system-ui}
#kb{flex:1;display:grid;grid-template-columns:repeat(10,1fr);gap:6px;padding:0 12px 12px;align-content:start;overflow-y:auto}
.k{background:#1a1a1a;border:0;color:#fff;padding:12px 0;border-radius:8px;font:600 15px system-ui}
.k.wide{grid-column:span 2}
.meta{padding:12px 16px}
.meta-t{font:700 17px/1.3 system-ui;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
</style>
</head>
<body>
<div id="app">
  <div class="tabs">
    <button class="tab focus active" data-t="home">Home</button>
    <button class="tab focus" data-t="search">Search</button>
    <button class="tab focus" data-t="shorts">Shorts</button>
    <button class="tab focus" data-t="live">Live</button>
  </div>
  <div class="list" id="list"></div>

  <div id="player">
    <div id="yt"></div>
    <div class="meta"><div class="meta-t" id="pt"></div></div>
    <div class="ctrls">
      <button class="btn focus" id="bback">← Back</button>
      <button class="btn focus" id="brew">⏪10</button>
      <button class="btn focus" id="bplay">⏯️</button>
      <button class="btn focus" id="bfwd">10⏩</button>
      <button class="btn focus" id="bfs">⛶</button>
    </div>
  </div>

  <div id="searchUI">
    <input id="q" readonly placeholder="Type with D-pad">
    <div id="kb"></div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const KEY='AIzaSyDPiJX_1AP0-350XEa32O1NIxrfhBWwGBk';
let player,current,focusables=[],fi=0,mode='list';

function q(s){return document.querySelector(s)} function qa(s){return [...document.querySelectorAll(s)]}
function setFocus(){
  qa('.focus').forEach(e=>e.classList.remove('focus'));
  focusables=qa('.focus').filter(e=>e.offsetParent);
  if(!focusables.length) return;
  fi=Math.max(0,Math.min(fi,focusables.length-1));
  focusables[fi].classList.add('focus');
  focusables[fi].focus();
}
function move(d){fi=(fi+d+focusables.length)%focusables.length;setFocus()}

async function load(t){
  qa('.tab').forEach(x=>x.classList.toggle('active',x.dataset.t===t));
  q('#searchUI').classList.remove('show');
  q('#player').classList.remove('show');
  q('.list').style.display='block';
  if(t==='search'){showKB();return}
  let url='';
  if(t==='home') url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&order=date&maxResults=20&q=a&key=${KEY}`;
  if(t==='shorts') url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&maxResults=20&q=shorts&key=${KEY}`;
  if(t==='live') url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&eventType=live&maxResults=20&q=live&key=${KEY}`;
  let vids=[];
  try{const r=await fetch(url);const j=await r.json();vids=j.items.map(i=>({id:i.id.videoId,t:i.snippet.title,c:i.snippet.channelTitle}))}catch(e){vids=[{id:'dQw4w9WgXcQ',t:'Rick Astley - Never Gonna Give You Up',c:'Rick Astley'},{id:'9bZkp7q19f0',t:'PSY - GANGNAM STYLE',c:'officialpsy'},{id:'jNQXAC9IVRw',t:'Me at the zoo',c:'jawed'}]}
  const L=q('#list');L.innerHTML='';
  vids.forEach(v=>{
    const d=document.createElement('div');d.className='card focus';d.tabIndex=0;
    d.innerHTML=`<img src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg"><div class="info"><div class="t">${v.t}</div><div class="c">${v.c}</div></div>`;
    d.onclick=()=>openV(v);
    L.appendChild(d);
  });
  mode='list';fi=4;setFocus();
}
function openV(v){
  current=v;
  q('#player').classList.add('show');
  q('.list').style.display='none';
  q('#pt').textContent=v.t;
  if(player)player.destroy();
  player=new YT.Player('yt',{videoId:v.id,playerVars:{autoplay:1,playsinline:1,controls:0},width:600,height:340});
  mode='player';fi=1;setFocus();
}
function closeV(){if(player)player.stopVideo();q('#player').classList.remove('show');q('.list').style.display='block';mode='list';fi=4;setFocus();}

// Keyboard
function showKB(){
  q('#searchUI').classList.add('show');
  q('.list').style.display='none';
  const kb=q('#kb');kb.innerHTML='';
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890'.split('').forEach(ch=>{
    const b=document.createElement('button');b.className='k focus';b.textContent=ch;b.onclick=()=>q('#q').value+=ch;kb.appendChild(b);
  });
  [['SPACE',' '],['DEL',''],['ENTER','']].forEach(([l,v])=>{
    const b=document.createElement('button');b.className='k focus wide';b.textContent=l;
    b.onclick=()=>{if(l==='SPACE')q('#q').value+=' ';if(l==='DEL')q('#q').value=q('#q').value.slice(0,-1);if(l==='ENTER'){q('#searchUI').classList.remove('show');q('.list').style.display='block';search(q('#q').value)}};
    kb.appendChild(b);
  });
  mode='kb';fi=0;setFocus();
}
async function search(q){
  const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20&q=${encodeURIComponent(q)}&key=${KEY}`;
  let vids=[];try{const r=await fetch(url);const j=await r.json();vids=j.items.map(i=>({id:i.id.videoId,t:i.snippet.title,c:i.snippet.channelTitle}))}catch(e){vids=[]}
  const L=q('#list');L.innerHTML='';vids.forEach(v=>{const d=document.createElement('div');d.className='card focus';d.innerHTML=`<img src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg"><div class="info"><div class="t">${v.t}</div><div class="c">${v.c}</div></div>`;d.onclick=()=>openV(v);L.appendChild(d)});mode='list';fi=4;setFocus();
}

// Controls
q('#bback').onclick=closeV;
q('#bplay').onclick=()=>{const s=player.getPlayerState();s===1?player.pauseVideo():player.playVideo()};
q('#brew').onclick=()=>player.seekTo(player.getCurrentTime()-10,true);
q('#bfwd').onclick=()=>player.seekTo(player.getCurrentTime()+10,true);
q('#bfs').onclick=()=>{
  const yt=q('#yt');
  const isFS=yt.style.height==='552px';
  yt.style.height=isFS?'340px':'552px';
  document.querySelector('.ctrls').style.display=isFS?'flex':'none';
  document.querySelector('.meta').style.display=isFS?'block':'none';
};

// Tabs
qa('.tab').forEach(t=>t.onclick=()=>load(t.dataset.t));

// D-pad
document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){e.preventDefault();move(e.key==='ArrowDown'||e.key==='ArrowRight'?1:-1)}
  if(e.key==='Enter'){e.preventDefault();document.activeElement?.click()}
  if(e.key==='Backspace'&&mode==='player')closeV();
});

load('home');
</script>
</body>
</html>
