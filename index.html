<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<meta name="ray-ban-display" content="true">
<title>YouTube Shorts</title>
<link rel="manifest" href="/manifest.json">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;color:#fff;font-family:system-ui;overflow:hidden}
  #top{position:fixed;top:12%;left:50%;transform:translateX(-50%);width:88%;z-index:10}
  #search{width:100%;padding:12px 16px;background:#111;border:1px solid #333;border-radius:24px;color:#fff;font-size:15px;outline:none}
  #feed{position:fixed;top:22%;left:50%;transform:translateX(-50%);width:88%;height:58vh;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}
 .v{background:#181818;border-radius:10px;overflow:hidden}.v img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
  /* SHORTS - Reels style */
  #shorts{position:fixed;inset:0;background:#000;display:none;z-index:20}
  #shorts.on{display:block}
  #player-wrap{position:absolute;inset:0}
  #player-wrap iframe{width:100%;height:100%;border:0;pointer-events:none}
  #overlay{position:absolute;inset:0;z-index:5} /* captures tap, blocks YT UI */
  #next-hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#fff8;font-size:12px;z-index:6;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  #tabs{position:fixed;bottom:8%;left:50%;transform:translateX(-50%);display:flex;gap:10px;background:#111;padding:6px 14px;border-radius:24px;z-index:30;border:1px solid #222}
 .tb{padding:6px 12px;color:#888;font-size:13px}.tb.on{color:#fff;background:#333;border-radius:16px}
</style>
</head>
<body>
<div id="top"><input id="search" type="search" placeholder="Search"></div>
<div id="feed"></div>

<div id="shorts">
  <div id="player-wrap"><div id="yt-player"></div></div>
  <div id="overlay"></div>
  <div id="next-hint">swipe down for next</div>
</div>

<div id="tabs"><div class="tb on" data-t="h">Home</div><div class="tb" data-t="s">Shorts</div></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// START WITH YOUR VIDEO
const SHORTS = ['tuKGo7FS6uU','KRJeVXQEoow','ckzUY_Dxp_g','8WylF542tR4','i5q7w0A4gHY','x5-KB5Kx8F4'];
let cur=0, player, unmuted=false;

function onYouTubeIframeAPIReady(){
  player = new YT.Player('yt-player',{
    videoId: SHORTS[0],
    playerVars:{
      controls:0,modestbranding:1,rel:0,playsinline:1,
      autoplay:1,mute:1,iv_load_policy:3,fs:0,disablekb:1,
      origin:location.origin
    },
    events:{onReady:e=>e.target.playVideo()}
  });
}

function nextShort(){
  cur=(cur+1)%SHORTS.length;
  player.loadVideoById({videoId:SHORTS[cur],startSeconds:0});
  if(unmuted) player.unMute();
}
function prevShort(){
  cur=(cur-1+SHORTS.length)%SHORTS.length;
  player.loadVideoById({videoId:SHORTS[cur],startSeconds:0});
  if(unmuted) player.unMute();
}

// tap = unmute (no YT UI shows)
document.getElementById('overlay').onclick=()=>{
  if(!unmuted){player.unMute();unmuted=true;document.getElementById('next-hint').style.display='none'}
};

// swipe detection
let sy=0;
const shortsEl=document.getElementById('shorts');
shortsEl.addEventListener('touchstart',e=>sy=e.touches[0].clientY);
shortsEl.addEventListener('touchend',e=>{const dy=e.changedTouches[0].clientY-sy;if(Math.abs(dy)>50)dy<0?nextShort():prevShort()});

// Ray-Ban
if(window.RayBanDisplay){
  const rb=new RayBanDisplay({gesture:true});
  rb.on('swipe',d=>d==='up'?prevShort():nextShort());
  rb.on('tap',()=>document.getElementById('overlay').click());
}

// tabs
function showHome(){document.getElementById('top').style.display='block';document.getElementById('feed').style.display='grid';shorts.classList.remove('on')}
function showShorts(){document.getElementById('top').style.display='none';document.getElementById('feed').style.display='none';shorts.classList.add('on');player.playVideo()}

document.querySelectorAll('.tb').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  b.dataset.t==='h'?showHome():showShorts();
});

// simple home
document.getElementById('feed').innerHTML=['dQw4w9WgXcQ','9bZkp7q19f0','kJQP7kiw5Fk'].map(id=>`
  <div class="v" onclick="window.open('https://m.youtube.com/watch?v=${id}')"><img src="https://i.ytimg.com/vi/${id}/mqdefault.jpg"></div>`).join('');

document.getElementById('search').onkeydown=e=>{if(e.key==='Enter')location.href=`https://m.youtube.com/results?search_query=${encodeURIComponent(e.target.value)}`};
</script>
</body>
</html>
